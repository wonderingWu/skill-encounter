<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>觉醒奇遇</title>
<style>
:root{
    --bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--text2:#86868b;
    --accent:#0071e3;--red:#ff3b30;--green:#34c759;--orange:#ff9500;
    --radius:16px;--shadow:0 2px 10px rgba(0,0,0,.04);
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
#app{max-width:960px;margin:0 auto;padding:24px 20px 60px;display:flex;gap:28px}
#sidebar{width:248px;flex-shrink:0;position:sticky;top:24px;align-self:flex-start}
#main{flex:1;min-width:0}
.header h1{font-size:26px;font-weight:700;letter-spacing:-.4px}
.header p{font-size:14px;color:var(--text2);margin:4px 0 16px}
.search-box{position:relative;margin-bottom:12px}
.search-box input{width:100%;padding:10px 14px 10px 36px;border:1px solid #d2d2d7;border-radius:12px;font-size:14px;font-family:var(--font);outline:none;background:var(--card)}
.search-box input:focus{border-color:var(--accent)}
.search-box::before{content:'🔍';position:absolute;left:12px;top:8px;font-size:14px}
.cat-list{display:flex;flex-direction:column;gap:4px}
.cat-item{padding:10px 14px;border-radius:10px;cursor:pointer;font-size:14px;transition:.15s;display:flex;align-items:center;gap:8px;color:var(--text2)}
.cat-item:hover{background:var(--card)}
.cat-item.active{background:var(--card);color:var(--text);font-weight:600;box-shadow:var(--shadow)}
.cat-emoji{font-size:18px}
.theme-dots{display:flex;gap:6px;margin-top:16px;padding-top:12px;border-top:1px solid #e5e5ea}
.theme-dot{width:24px;height:24px;border-radius:12px;cursor:pointer;border:2px solid transparent;transition:.15s}
.theme-dot:hover{transform:scale(1.15)}.theme-dot.active{border-color:var(--text)}

/* profile card */
.profile-card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.profile-card .pf-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.profile-card .pf-avatar{width:36px;height:36px;border-radius:18px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px}
.profile-card .pf-name{font-weight:600;font-size:15px}
.profile-card .pf-edit{font-size:12px;color:var(--accent);cursor:pointer;margin-left:auto}
.profile-card .pf-tags{display:flex;gap:4px;flex-wrap:wrap}
.profile-card .pf-tag{font-size:11px;padding:3px 10px;border-radius:20px;background:#f0f0f5;color:var(--text2)}
.profile-card .pf-empty{font-size:13px;color:var(--text2);text-align:center;padding:12px 0}
.profile-card .pf-btn{display:block;width:100%;padding:10px;border-radius:10px;border:1.5px dashed #d2d2d7;background:transparent;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);margin-top:8px;transition:.15s}
.profile-card .pf-btn:hover{border-color:var(--accent);background:#f0f5ff}

/* coach card */
.coach-card{background:var(--card);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow);margin-bottom:12px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:.15s}
.coach-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.coach-avatar{width:40px;height:40px;border-radius:20px;background:#f0f0f5;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.coach-info{flex:1;min-width:0}
.coach-name{font-weight:600;font-size:14px}
.coach-tagline{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.coach-change{font-size:11px;color:var(--accent);font-weight:600;padding:3px 8px;border-radius:10px;background:#f0f5ff;flex-shrink:0}
.coach-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:60vh;overflow-y:auto}
.coach-option{padding:12px;border:1.5px solid #e5e5ea;border-radius:12px;cursor:pointer;transition:.15s;text-align:left}
.coach-option:hover{border-color:var(--accent)}
.coach-option.selected{border-color:var(--accent);background:#f0f5ff}
.coach-option .co-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.coach-option .co-emoji{font-size:24px}
.coach-option .co-name{font-weight:600;font-size:14px}
.coach-option .co-strengths{display:flex;gap:4px;margin-top:4px}
.coach-option .co-str{border:1px solid var(--accent);color:var(--accent);font-size:11px;padding:2px 8px;border-radius:10px}
.coach-option .co-tagline{font-size:12px;color:var(--text2);margin-top:4px}
/* custom coach form */
.coach-custom-form{margin-top:12px;padding:12px;background:#f5f5f7;border-radius:12px}
.coach-custom-form .cf-row{margin-bottom:8px}
.coach-custom-form .cf-row label{font-size:12px;font-weight:600;display:block;margin-bottom:2px}
.coach-custom-form .cf-row input,.coach-custom-form .cf-row textarea{width:100%;padding:8px 10px;border:1px solid #d2d2d7;border-radius:8px;font-size:13px;font-family:var(--font);outline:none}
.coach-custom-form .cf-row textarea{resize:vertical;min-height:48px}
.coach-custom-form .cf-row input:focus,.coach-custom-form .cf-row textarea:focus{border-color:var(--accent)}
/* recommend coach card */
.recommend-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin:12px 0;border:2px solid var(--accent);animation:fadeUp .3s}
.recommend-card .rc-title{font-size:15px;font-weight:700;margin-bottom:4px}
.recommend-card .rc-sub{font-size:12px;color:var(--text2);margin-bottom:12px}
.recommend-card .rc-coaches{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.rc-coach{padding:12px 14px;border:1.5px solid #e5e5ea;border-radius:12px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:10px}
.rc-coach:hover{border-color:var(--accent);background:#f0f5ff}
.rc-coach.best{border-color:var(--accent);background:#f8faff}
.rc-coach .rc-emoji{font-size:28px;flex-shrink:0}
.rc-coach .rc-info{flex:1;min-width:0}
.rc-coach .rc-name{font-weight:600;font-size:14px}
.rc-coach .rc-reason{font-size:12px;color:var(--text2);line-height:1.4}
.rc-coach .rc-badge{font-size:10px;color:var(--accent);font-weight:600;background:#f0f5ff;padding:2px 8px;border-radius:8px;flex-shrink:0}
.rc-escape{padding:10px;border:1.5px dashed #d2d2d7;border-radius:12px;cursor:pointer;text-align:center;font-size:13px;color:var(--text2);transition:.15s}
.rc-escape:hover{border-color:var(--accent);color:var(--accent)}

/* hex card */
.hex-card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.hex-card h3{font-size:14px;font-weight:600;margin-bottom:8px}
.hex-chart{display:flex;justify-content:center}
.hex-labels{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:8px}
.hex-label{font-size:11px;color:var(--text2);text-align:center;padding:2px}
.hex-label .hl-score{font-size:18px;font-weight:700;color:var(--text)}

/* modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:var(--radius);padding:24px;max-width:460px;width:90%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:18px;margin-bottom:4px}
.modal .sub{font-size:13px;color:var(--text2);margin-bottom:16px}
.modal .step{display:none}.modal .step.active{display:block}

/* form */
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:13px;font-weight:600;margin-bottom:4px}
.form-row select{width:100%;padding:10px 14px;border:1px solid #d2d2d7;border-radius:10px;font-size:15px;font-family:var(--font);background:var(--card);outline:none;appearance:none}
.form-row select:focus{border-color:var(--accent)}
/* concern grid */
.concern-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.concern-item{padding:12px;border:1.5px solid #e5e5ea;border-radius:12px;cursor:pointer;text-align:center;transition:.15s;font-size:14px}
.concern-item:hover{border-color:var(--accent)}
.concern-item.selected{border-color:var(--accent);background:#f0f5ff}
.concern-item .ci-emoji{font-size:22px;display:block;margin-bottom:4px}
.concern-item .ci-check{display:none;font-size:12px;color:var(--accent);margin-top:2px}
.concern-item.selected .ci-check{display:block}

/* slider */
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.slider-row .dim-emoji{font-size:18px}
.slider-row .dim-name{font-size:13px;font-weight:600;width:70px;flex-shrink:0}
.slider-row input[type=range]{flex:1;accent-color:var(--accent)}
.slider-row .dim-val{font-size:15px;font-weight:700;width:24px;text-align:center}

.modal .btn-row{display:flex;gap:8px;margin-top:16px}
.modal .btn-row button{flex:1;padding:12px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font)}
.btn-next{background:var(--accent);color:#fff}
.btn-prev{background:#f0f0f5;color:var(--text)}
.btn-cancel{background:#f0f0f5;color:var(--text)}
.btn-save{background:var(--green);color:#fff}

/* scene grid */
.scene-grid{display:flex;flex-direction:column;gap:12px}
.scene-card{background:var(--card);border-radius:var(--radius);padding:20px 22px;cursor:pointer;transition:.18s;box-shadow:var(--shadow);border:1.5px solid transparent}
.scene-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.card-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.card-emoji{font-size:26px}.card-title{font-size:16px;font-weight:600}
.card-desc{font-size:13px;color:var(--text2);line-height:1.5}
.card-tags{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.card-tag{font-size:11px;padding:3px 10px;border-radius:20px;background:#f0f0f5;color:var(--text2)}
.card-recommend{border-color:var(--accent);background:#f8faff}
.card-recommend::before{content:'🎯 AI推荐';font-size:11px;color:var(--accent);display:block;margin-bottom:6px;font-weight:600}
.no-result{text-align:center;padding:40px;color:var(--text2)}

/* pages */
.page{display:none}.page.active{display:flex;flex-direction:column}

/* chat */
.practice-header{display:flex;align-items:center;gap:12px;padding:12px 0;margin-bottom:16px;border-bottom:1px solid #e5e5ea}
.btn-back,.btn-end{padding:6px 14px;border-radius:20px;border:1px solid #d2d2d7;background:#fff;font-size:13px;cursor:pointer;font-family:var(--font)}
.btn-end{color:var(--red);border-color:var(--red)}
.chat-area{display:flex;flex-direction:column;gap:16px;min-height:50vh;padding:8px 0;flex:1}
.msg{max-width:88%;padding:12px 16px;border-radius:18px;font-size:15px;line-height:1.6;animation:fadeUp .25s}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.ai{align-self:flex-start;background:var(--card);border:1px solid #e5e5ea;border-bottom-left-radius:6px}
.msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:6px}
.msg .label{font-size:12px;opacity:.6;margin-bottom:4px}
.chat-input{display:flex;gap:8px;padding:12px 0}
.chat-input textarea{flex:1;padding:12px 16px;border:1px solid #d2d2d7;border-radius:22px;font-size:15px;font-family:var(--font);resize:none;outline:none}
.chat-input textarea:focus{border-color:var(--accent)}
.btn-send{padding:10px 22px;border-radius:22px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font)}
.btn-send:disabled{opacity:.4}
.btn-mic{width:44px;height:44px;border-radius:22px;border:1.5px solid #d2d2d7;background:var(--card);font-size:20px;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-mic:hover{border-color:var(--accent)}
.btn-mic.listening{background:var(--red);border-color:var(--red);color:#fff;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,59,48,.4)}50%{box-shadow:0 0 0 12px rgba(255,59,48,0)}}

/* feedback */
.feedback-card{background:var(--card);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow)}
.fb-vs{display:flex;gap:16px;justify-content:center;margin-bottom:20px}
.fb-vs-col{text-align:center;flex:1;padding:12px;background:#f5f5f7;border-radius:12px}
.fb-vs-col .vs-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.fb-vs-col .vs-score{font-size:28px;font-weight:800;color:var(--accent)}
.fb-vs-gap{font-size:12px;margin-top:4px}
.fb-vs-gap.over{color:var(--green)}.fb-vs-gap.under{color:var(--red)}
.fb-dims{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.fb-dim{background:#f5f5f7;border-radius:12px;padding:14px}
.fb-dim .dn{font-size:14px;font-weight:600;margin-bottom:4px}
.fb-dim .ds{font-size:16px;margin-bottom:4px}
.fb-dim .dc{font-size:13px;color:var(--text2);line-height:1.4}
.fb-section{margin-bottom:16px}.fb-section h3{font-size:15px;margin-bottom:8px}
.fb-section ul{padding-left:20px;font-size:14px;color:var(--text2);line-height:1.8}
.fb-summary{background:#f0f0f5;border-radius:12px;padding:16px;font-size:15px;text-align:center;line-height:1.7;margin-bottom:20px}
.btn-primary{display:block;width:100%;padding:14px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-size:16px;font-weight:600;cursor:pointer;font-family:var(--font)}
.loading{text-align:center;padding:40px;color:var(--text2)}

@media(max-width:700px){
    #app{flex-direction:column;padding:16px 14px 60px}
    #sidebar{width:100%;position:static;flex-shrink:1}
    .cat-list{flex-direction:row;overflow-x:auto;gap:6px;padding-bottom:4px}
    .cat-item{white-space:nowrap;padding:8px 14px;font-size:13px}
}
</style>
</head>
<body>
<div id="app">

<!-- ═════ SIDEBAR ═════ -->
<aside id="sidebar">
    <div class="header"><h1>🎯 觉醒奇遇</h1><p id="header-sub">认识自己，从一次对话开始</p></div>

    <!-- profile -->
    <div class="profile-card" id="profile-card">
        <div class="pf-head">
            <div class="pf-avatar" id="pf-avatar">👤</div>
            <span class="pf-name" id="pf-name">未设置画像</span>
            <span class="pf-edit" onclick="openProfile()">编辑</span>
        </div>
        <div class="pf-tags" id="pf-tags"><span class="pf-empty">花30秒完善画像，AI给你精准推荐</span></div>
        <button class="pf-btn" onclick="openProfile()">⚡ 快速画像（30秒）</button>
    </div>

    <!-- coach card -->
    <div class="coach-card" id="coach-card" onclick="openCoachPicker()">
        <div class="coach-avatar" id="coach-avatar">⚡️</div>
        <div class="coach-info">
            <div class="coach-name" id="coach-name">苏格拉底</div>
            <div class="coach-tagline" id="coach-tagline">我不给你答案，我给你更好的问题</div>
        </div>
        <div class="coach-change">换</div>
    </div>
    <!-- journey status -->
    <div class="journey-card" id="journey-card" style="display:none">
        <div style="font-size:12px;color:var(--text2);margin-bottom:2px">📈 你的旅程</div>
        <div style="font-size:13px"><span id="journey-count">0</span> 次练习 · 最新评分 <span id="journey-score" style="font-weight:700;color:var(--accent)">--</span></div>
    </div>
</aside>

<!-- ═════ MAIN ═════ -->
<main id="main">
<div id="scene-page" class="page active">
    <div class="recommend-card" id="recommend-card" style="display:none"></div>
    <div class="scene-grid" id="scene-grid"><div class="loading">加载中…</div></div>
</div>

<div id="practice-page" class="page">
    <div class="practice-header">
        <button class="btn-back" onclick="goBack()">←</button>
        <span id="prac-emoji" style="font-size:22px"></span>
        <span id="prac-title" style="font-weight:600;font-size:15px;flex:1"></span>
        <span id="prac-coach" style="font-size:12px;color:var(--accent);background:#f0f5ff;padding:3px 10px;border-radius:12px"></span>
        <span id="prac-round" style="font-size:13px;color:var(--text2)"></span>
        <button class="btn-end" id="btn-end" onclick="endPractice()">结束</button>
    </div>
    <div class="chat-area" id="chat-area"></div>
    <div class="chat-input">
        <textarea id="chat-input" placeholder="说说你的想法…" rows="1"></textarea>
        <button class="btn-mic" id="btn-mic" onclick="toggleVoice()" title="语音转文字">🎤</button>
        <button class="btn-mic" id="btn-call" onclick="toggleCallMode()" title="真声练习" style="display:none">📞</button>
        <button class="btn-send" id="btn-send" onclick="sendMsg()">发送</button>
    </div>
</div>

<div id="feedback-page" class="page">
    <div class="feedback-card">
        <div class="fb-vs" id="fb-vs"></div>
        <div class="fb-dims" id="fb-dims"></div>
        <div class="fb-section" id="fb-patterns-section" style="display:none;background:#f8faff;border:1.5px solid #c4d4ff;border-radius:14px;padding:16px;margin-bottom:16px">
            <h3>🧠 你刚才无意中用到的思维框架</h3>
            <div id="fb-patterns"></div>
        </div>
        <div class="fb-section"><h3>✨ 做得好的</h3><ul id="fb-strengths"></ul></div>
        <div class="fb-section"><h3>🔧 可以试试</h3><ul id="fb-improvements"></ul></div>
        <div class="fb-summary" id="fb-summary"></div>
        <button class="btn-primary" onclick="goBack()">再练一次</button>
    </div>
</div>
</main>
</div>

<!-- ═══ profile modal ═══ -->
<div class="modal-overlay" id="profile-modal">
<div class="modal">
    <h3>⚡ 快速画像</h3>
    <p class="sub">花30秒，AI就能给你精准推荐练习方向</p>

    <!-- step 1: basic info -->
    <div class="step active" id="step1">
        <div class="form-row">
            <label>年级</label>
            <select id="pf-year">
                <option value="">请选择</option>
                <option>大一</option><option>大二</option><option>大三</option><option>大四</option>
                <option>研一</option><option>研二</option><option>研三</option><option>其他</option>
            </select>
        </div>
        <div class="form-row">
            <label>专业大类</label>
            <select id="pf-major">
                <option value="">请选择</option>
                <option>计算机/软件</option><option>电子信息/通信</option><option>机械/自动化</option>
                <option>理科(数学/物理/化学)</option><option>商科/经济/管理</option>
                <option>文科(中文/历史/哲学)</option><option>社科(社会学/心理学/法学)</option>
                <option>设计/艺术/传媒</option><option>医学/药学</option><option>其他</option>
            </select>
        </div>
        <div class="form-row">
            <label>最担心的3件事（点击选择）</label>
            <div class="concern-grid" id="concern-grid"></div>
        </div>
        <div class="btn-row"><button class="btn-next" onclick="nextStep()">下一步 →</button></div>
    </div>

    <!-- step 2: hex self-rate -->
    <div class="step" id="step2">
        <p class="sub">诚实地给自己打分（0=完全不行，5=非常强）</p>
        <div id="sliders"></div>
        <div class="btn-row">
            <button class="btn-prev" onclick="prevStep()">← 上一步</button>
            <button class="btn-save" onclick="saveProfile()">✅ 完成画像</button>
        </div>
    </div>
</div>
</div>

<!-- ═══ coach picker modal ═══ -->
<div class="modal-overlay" id="coach-modal">
<div class="modal">
    <h3>🎭 选择你的教练</h3>
    <p class="sub">不同教练有不同的人格、说话风格和擅长领域。选一个让你舒服的。</p>
    <div class="coach-grid" id="coach-grid"><div class="loading">加载中...</div></div>
    <div class="coach-custom-form" id="coach-custom" style="display:none">
        <div class="cf-row"><label>教练名称</label><input id="cf-name" placeholder="给你的教练起个名字"></div>
        <div class="cf-row"><label>头像 Emoji</label><input id="cf-emoji" placeholder="🤖"></div>
        <div class="cf-row"><label>一句话介绍</label><input id="cf-tagline" placeholder="比如：用温柔的追问让你看见自己"></div>
        <div class="cf-row"><label>人格描述</label><textarea id="cf-personality" placeholder="描述你想让教练怎么跟你对话..."></textarea></div>
        <button class="btn-save" onclick="saveCustomCoach()" style="width:100%;margin-top:8px">✅ 使用自定义教练</button>
    </div>
    <div class="btn-row" style="margin-top:12px">
        <button class="btn-prev" onclick="toggleCustomCoach()">✏️ 自定义</button>
        <button class="btn-cancel" onclick="closeCoachPicker()">取消</button>
    </div>
</div>
</div>

<script>
// ═══════ CONCERNS ═══════
const CONCERNS=[
    {v:'interview',emoji:'😰',label:'面试说不出话'},
    {v:'direction',emoji:'😵',label:'不知道适合什么'},
    {v:'presentation',emoji:'🗣️',label:'课堂pre紧张'},
    {v:'social',emoji:'👥',label:'不敢社交怕被孤立'},
    {v:'ai_gap',emoji:'💻',label:'怕被AI取代'},
    {v:'career_path',emoji:'🎓',label:'考研工作拿不准'},
    {v:'money',emoji:'💰',label:'钱不够花压力大'},
    {v:'meaning',emoji:'😶',label:'不知道卷是为了什么'},
    {v:'academic',emoji:'📚',label:'学业压力大怕挂科'},
    {v:'family',emoji:'🏠',label:'家里人不理解我'},
    {v:'self_worth',emoji:'🪞',label:'总觉得自己不够好'},
];
let scenesData=[]; // 从后端 API 加载
const DIMS=[
    {id:'expression',emoji:'💬',name:'表达影响力'},
    {id:'logic',emoji:'🧩',name:'逻辑分析力'},
    {id:'self_awareness',emoji:'🪞',name:'自我认知力'},
    {id:'collaboration',emoji:'🤝',name:'人际协作力'},
    {id:'ai_literacy',emoji:'🤖',name:'AI素养力'},
    {id:'adaptability',emoji:'🌱',name:'适应创新力'},
];
// concern → scene mapping
const CONCERN_MAP={
    interview:'pm-interview-beginner',direction:'pm-interview-advanced',
    presentation:'speech-improv-beginner',
    social:'speech-improv-intermediate',ai_gap:'speech-improv-intermediate',
    career_path:'pm-interview-beginner',
    money:'pm-interview-intermediate',meaning:'pm-interview-advanced',
    academic:'pm-interview-beginner',family:'pm-interview-advanced',
    self_worth:'speech-improv-beginner',
};

// ═══════ PROFILE ═══════
let profile={year:'',major:'',concerns:[]};
let hexSelf=null,hexAI=null,hexHistory=[];

async function loadProfile(){
    try{
        const data=await api('/api/practice/profile');
        if(data.profile){profile=data.profile}
        if(data.hexagon){
            if(data.hexagon.self_assessment)hexSelf=data.hexagon.self_assessment;
            if(data.hexagon.latest_ai)hexAI=data.hexagon.latest_ai;
            hexHistory=data.hexagon.history||[];
        }
    }catch(e){}
    renderProfile();
    // 更新旅程状态
    const count=hexHistory.length;
    if(count>0){
        document.getElementById('journey-card').style.display='block';
        document.getElementById('journey-count').textContent=count;
        if(hexAI){
            const avg=Object.values(hexAI).reduce((a,b)=>a+(isNaN(b)?0:b),0)/6;
            document.getElementById('journey-score').textContent=avg.toFixed(1);
        }
    }
}

function renderProfile(){
    const hasProfile=profile.year||profile.concerns?.length;
    if(hasProfile){
        document.getElementById('pf-name').textContent=`${profile.year||''} · ${profile.major||''}`;
        document.getElementById('pf-avatar').textContent=profile.year?profile.year[0]:'👤';
    }else{
        document.getElementById('pf-name').textContent='未设置画像';
        document.getElementById('pf-avatar').textContent='👤';
    }
    const tags=document.getElementById('pf-tags');
    if(profile.concerns?.length){
        tags.innerHTML=profile.concerns.map(c=>{
            const co=CONCERNS.find(x=>x.v===c);
            return co?`<span class="pf-tag">${co.emoji} ${co.label}</span>`:'';
        }).join('');
    }else{
        tags.innerHTML='<span class="pf-empty">花30秒完善画像，AI给你精准推荐</span>';
    }
    document.querySelectorAll('.concern-item').forEach(el=>{
        el.classList.toggle('selected',profile.concerns?.includes(el.dataset.v));
    });
}

// ═══════ PROFILE MODAL ═══════
let profileStep=1,selectedConcerns=[];
function openProfile(){
    selectedConcerns=[...(profile.concerns||[])];
    document.getElementById('pf-year').value=profile.year||'';
    document.getElementById('pf-major').value=profile.major||'';
    document.querySelectorAll('.concern-item').forEach(el=>{
        el.classList.toggle('selected',selectedConcerns.includes(el.dataset.v));
    });
    profileStep=1;
    showStep(1);
    document.getElementById('profile-modal').classList.add('show');
}
function closeProfile(){document.getElementById('profile-modal').classList.remove('show')}
function showStep(n){
    profileStep=n;
    document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
    document.getElementById('step'+n).classList.add('active');
    if(n===2){
        document.getElementById('sliders').innerHTML=DIMS.map(d=>{
            const v=hexSelf?hexSelf[d.id]:1;
            return `<div class="slider-row">
                <span class="dim-emoji">${d.emoji}</span><span class="dim-name">${d.name}</span>
                <input type="range" min="0" max="5" step="0.5" value="${v}" id="sl-${d.id}" oninput="document.getElementById('vl-${d.id}').textContent=this.value">
                <span class="dim-val" id="vl-${d.id}">${v}</span>
            </div>`;
        }).join('');
    }
}
function nextStep(){
    profile.year=document.getElementById('pf-year').value;
    profile.major=document.getElementById('pf-major').value;
    profile.concerns=selectedConcerns;
    showStep(2);
}
function prevStep(){showStep(1)}
async function saveProfile(){
    const btn=document.querySelector('#step2 .btn-save');
    btn.disabled=true; btn.textContent='⏳ 保存中...';
    profile.concerns=selectedConcerns;
    const hexScores={};
    DIMS.forEach(d=>{hexScores[d.id]=parseFloat(document.getElementById('sl-'+d.id).value)});
    hexSelf=hexScores;
    try{
        await api('/api/practice/profile',{method:'POST',body:JSON.stringify({
            year:profile.year,major:profile.major,concerns:profile.concerns,
            hexagon_self:hexScores
        })});
    }catch(e){
        console.error('保存画像失败:',e);
        btn.disabled=false; btn.textContent='✅ 完成画像';
        return;
    }
    closeProfile();
    renderProfile();
    loadScenes();
    await recommendCoaches();
}

async function recommendCoaches(){
    if(!profile.concerns?.length) return;
    try{
        const data=await api('/api/coaches/recommend',{method:'POST',body:JSON.stringify({
            concerns:profile.concerns,hexagon_self:hexSelf
        })});
        const recs=data.recommendations||[];
        if(!recs.length) return;
        const card=document.getElementById('recommend-card');
        const best=recs[0];const alt=recs[1];
        card.innerHTML=`
            <div class="rc-title">✨ 为你推荐教练</div>
            <div class="rc-sub">根据你的画像和担忧，这2位教练最适合你</div>
            <div class="rc-coaches">
                ${best?`
                <div class="rc-coach best" onclick="selectRecommendedCoach('${best.coach.id}')">
                    <span class="rc-emoji">${best.coach.emoji}</span>
                    <div class="rc-info">
                        <div class="rc-name">${best.coach.name}</div>
                        <div class="rc-reason">${best.reason}</div>
                    </div>
                    <span class="rc-badge">🎯 最佳匹配</span>
                </div>`:''}
                ${alt?`
                <div class="rc-coach" onclick="selectRecommendedCoach('${alt.coach.id}')">
                    <span class="rc-emoji">${alt.coach.emoji}</span>
                    <div class="rc-info">
                        <div class="rc-name">${alt.coach.name}</div>
                        <div class="rc-reason">${alt.reason}</div>
                    </div>
                </div>`:''}
            </div>
            <div class="rc-escape" onclick="openCoachPicker()">📋 我自己选一个不一样的 →</div>
        `;
        card.style.display='block';
    }catch(e){console.error('教练推荐失败',e);}
}
function selectRecommendedCoach(id){
    selectCoach(id);
    document.getElementById('recommend-card').style.display='none';
}

// ═══════ CONCERN GRID ═══════
(function initConcerns(){
    const grid=document.getElementById('concern-grid');
    CONCERNS.forEach(c=>{
        const d=document.createElement('div');
        d.className='concern-item';d.dataset.v=c.v;
        d.innerHTML=`<span class="ci-emoji">${c.emoji}</span>${c.label}<span class="ci-check">✓ 已选</span>`;
        d.onclick=()=>{
            if(selectedConcerns.includes(c.v)){
                selectedConcerns=selectedConcerns.filter(x=>x!==c.v);
            }else if(selectedConcerns.length<3){
                selectedConcerns.push(c.v);
            }
            document.querySelectorAll('.concern-item').forEach(el=>{
                el.classList.toggle('selected',selectedConcerns.includes(el.dataset.v));
            });
        };
        grid.appendChild(d);
    });
})();

// ═══════ API ═══════
async function api(path,opts={}){
    const isFormData=opts.body instanceof FormData;
    const headers=isFormData?{}:{'Content-Type':'application/json'};
    const res=await fetch(path,{headers,...opts});
    if(!res.ok){const e=await res.json().catch(()=>({detail:res.statusText}));const msg=typeof e.detail==='string'?e.detail:JSON.stringify(e.detail);throw new Error(msg);}
    return res.json();
}

async function loadScenes(){
    try{
        const data=await api('/api/scenes');

        scenesData=data.scenes||[];
    }catch(e){console.error('加载场景失败',e);scenesData=[]}
    filterScenes();
}
function filterScenes(){
    let list=scenesData;
    const recScene=profile.concerns?.length?CONCERN_MAP[profile.concerns[0]]:null;
    const grid=document.getElementById('scene-grid');
    if(!list.length){grid.innerHTML='<div class="no-result">没有匹配的场景</div>';return}
    grid.innerHTML=list.map(s=>`
        <div class="scene-card${recScene===s.id?' card-recommend':''}" onclick="start('${s.id}')">
            <div class="card-head"><span class="card-emoji">${s.emoji||'💬'}</span><span class="card-title">${s.title}</span></div>
            <div class="card-desc">${s.description}</div>
            <div class="card-tags">${(s.tags||[]).map(t=>`<span class="card-tag">${t}</span>`).join('')}</div>
        </div>
    `).join('');
}

// ═══════ PAGES ═══════
let state={sessionId:null,scene:null,sceneRole:'教练',coachName:'教练'};
let curCoach=null; // 不设默认，画像完成后由推荐引擎分配
let coachesData=[];
async function loadCoaches(){
    try{const data=await api('/api/coaches');coachesData=data.coaches||[];}
    catch(e){console.error('加载教练失败',e);}
    const saved=localStorage.getItem('sk_encounter_coach');
    if(saved){try{const c=JSON.parse(saved);if(c.id)curCoach=c;}catch(e){}}
    renderCoachCard();
}
function renderCoachCard(){
    if(!curCoach){
        document.getElementById('coach-avatar').textContent='🎭';
        document.getElementById('coach-name').textContent='选择你的教练';
        document.getElementById('coach-tagline').textContent='完成画像后AI为你推荐';
        return;
    }
    document.getElementById('coach-avatar').textContent=curCoach.emoji||'🤖';
    document.getElementById('coach-name').textContent=curCoach.name||'教练';
    document.getElementById('coach-tagline').textContent=curCoach.tagline||'';
}
function openCoachPicker(){
    document.getElementById('coach-modal').classList.add('show');
    renderCoachPicker();
}
function closeCoachPicker(){
    document.getElementById('coach-modal').classList.remove('show');
    document.getElementById('coach-custom').style.display='none';
}
function toggleCustomCoach(){
    const el=document.getElementById('coach-custom');
    el.style.display=el.style.display==='none'?'block':'none';
}
function renderCoachPicker(){
    const grid=document.getElementById('coach-grid');
    if(!coachesData.length){grid.innerHTML='<div class="loading">教练加载中...</div>';return}
    grid.innerHTML=coachesData.map(c=>`
        <div class="coach-option${curCoach.id===c.id?' selected':''}" onclick="selectCoach('${c.id}')">
            <div class="co-head"><span class="co-emoji">${c.emoji||'🤖'}</span><span class="co-name">${c.name}</span></div>
            <div class="co-tagline">${c.tagline||''}</div>
            <div class="co-strengths">${(c.strengths||[]).map(s=>`<span class="co-str">${dimName(s)}</span>`).join('')}</div>
        </div>
    `).join('');
}
function dimName(id){const d=DIMS.find(x=>x.id===id);return d?d.emoji+d.name:id}
function selectCoach(id){
    const c=coachesData.find(x=>x.id===id);
    if(c){curCoach={id:c.id,name:c.name,emoji:c.emoji,tagline:c.tagline};renderCoachCard();}
    closeCoachPicker();
    localStorage.setItem('sk_encounter_coach',JSON.stringify(curCoach));
}
function saveCustomCoach(){
    const name=document.getElementById('cf-name').value.trim();
    if(!name){alert('请输入教练名称');return}
    curCoach={
        id:'custom_'+Date.now(),
        name:name,
        emoji:document.getElementById('cf-emoji').value.trim()||'🤖',
        tagline:document.getElementById('cf-tagline').value.trim()||'',
        personality:document.getElementById('cf-personality').value.trim()||'',
    };
    renderCoachCard();
    closeCoachPicker();
    localStorage.setItem('sk_encounter_coach',JSON.stringify(curCoach));
}
function showPage(n){
    document.querySelectorAll('#main > .page').forEach(p=>p.classList.remove('active'));
    const el=document.getElementById(n+'-page');
    if(el)el.classList.add('active');
    document.getElementById('sidebar').style.display=n==='scene'?'block':'none';
}
function goBack(){state.sessionId=null;showPage('scene');document.getElementById('sidebar').style.display='block';loadScenes();loadProfile();loadCoaches();}

// ═══════ PRACTICE ═══════
async function start(sceneId){
    if(!curCoach){
        alert('请先完成30秒画像，AI会为你推荐专属教练 ✨');
        openProfile();
        return;
    }
    try{
        const body={scene_id:sceneId,coach_id:curCoach.id};
        if(curCoach.id.startsWith('custom_')){
            body.custom_coach={name:curCoach.name,emoji:curCoach.emoji,tagline:curCoach.tagline,personality:curCoach.personality||''};
        }
        const data=await api('/api/practice/start',{method:'POST',body:JSON.stringify(body)});
        state.sessionId=data.session_id;state.scene=data.scene;
        state.sceneRole=data.scene?.interviewer_role||'教练';
        state.coachName=curCoach.name||'教练';
        const sc=data.scene;
        document.getElementById('prac-emoji').textContent=curCoach.emoji||sc?.emoji||'💬';
        document.getElementById('prac-title').textContent=sc?.title||'';
        document.getElementById('prac-coach').textContent=curCoach.name||'';
        document.getElementById('prac-round').textContent='第1轮';
        document.getElementById('chat-area').innerHTML='';
        document.getElementById('chat-input').value='';
        showPage('practice');
        // 演讲/辩论场景显示真声练习按钮
        const callBtn=document.getElementById('btn-call');
        callBtn.style.display=(sc?.cat==='express')?'flex':'none';
        callBtn.classList.remove('listening');callBtn.textContent='📞';
        addMsg('assistant',data.opening_message);
    }catch(e){alert('出错了: '+e.message);}
}
function addMsg(role,content){
    const area=document.getElementById('chat-area');
    const d=document.createElement('div');d.className='msg '+(role==='assistant'?'ai':'user');
    const aiLabel=curCoach?`${curCoach.emoji||'💬'} ${curCoach.name||state.sceneRole}`:'💬 教练';
    d.innerHTML=`<div class="label">${role==='assistant'?aiLabel:'👤 你'}</div>${esc(content)}`;
    area.appendChild(d);area.scrollTop=area.scrollHeight;
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML.replace(/\n/g,'<br>');}
async function sendMsg(){
    const input=document.getElementById('chat-input');const msg=input.value.trim();
    if(!msg||!state.sessionId)return;
    const btn=document.getElementById('btn-send');btn.disabled=true;btn.textContent='...';
    addMsg('user',msg);input.value='';
    try{
        const data=await api('/api/practice/message',{method:'POST',body:JSON.stringify({session_id:state.sessionId,message:msg})});
        addMsg('assistant',data.reply);
        document.getElementById('prac-round').textContent='第'+data.current_round+'轮';
    }catch(e){addMsg('assistant','⚠️ '+e.message)}
    finally{btn.disabled=false;btn.textContent='发送';input.focus();}
}
async function endPractice(){
    if(!state.sessionId||!confirm('确定结束并查看反馈吗？'))return;
    const btn=document.getElementById('btn-end');btn.disabled=true;btn.textContent='评估中…';
    try{
        const data=await api('/api/practice/end',{method:'POST',body:JSON.stringify({session_id:state.sessionId})});
        state.sessionId=null;showFeedback(data.feedback);
        await loadProfile();
    }catch(e){alert(e.message);btn.disabled=false;btn.textContent='结束';}
}

// ═══════ FEEDBACK ═══════
function showFeedback(fb){
    showPage('feedback');
    const selfTotal=hexSelf?Object.values(hexSelf).reduce((a,b)=>a+(isNaN(b)?0:b),0)/6:null;
    const gap=selfTotal!==null&&!isNaN(fb.overall_score)?fb.overall_score-selfTotal:null;
    const safeScore=isNaN(fb.overall_score)?'--':fb.overall_score.toFixed(1);
    document.getElementById('fb-vs').innerHTML=(selfTotal!==null?`
        <div class="fb-vs-col"><div class="vs-label">📍 自评</div><div class="vs-score">${selfTotal.toFixed(1)}</div></div>
        <div class="fb-vs-col"><div class="vs-label">🤖 AI评估</div><div class="vs-score">${safeScore}</div>
        <div class="fb-vs-gap ${gap>0?'under':'over'}">${gap>0?'你低估了自己 +'+gap.toFixed(1):'你高估了自己 '+(gap).toFixed(1)}</div></div>
    `:'');
    document.getElementById('fb-dims').innerHTML=fb.dimensions.map(d=>`
        <div class="fb-dim"><div class="dn">${d.name}</div><div class="ds">${'⭐'.repeat(Math.round(d.score))}</div><div class="dc">${esc(d.comment||'')}</div></div>
    `).join('');
    document.getElementById('fb-strengths').innerHTML=fb.strengths.map(s=>`<li>${esc(s)}</li>`).join('')||'<li>继续练习，AI会给出更精准的评估</li>';
    // After-Action Review: frameworks discovered
    const patterns=fb.frameworks_discovered||[];
    const ps=document.getElementById('fb-patterns-section');
    if(patterns.length>0){
        ps.style.display='block';
        document.getElementById('fb-patterns').innerHTML=patterns.map(f=>{
            const p=(fb.patterns_used&&fb.patterns_used[f])||{};
            return `<div style="margin-bottom:12px"><div style="font-weight:700;font-size:14px">⭐ ${esc(f)}</div>
            <div style="font-size:13px;color:var(--text2);margin:4px 0">${esc(p.explanation||'')}</div>
            ${p.evidence?`<div style="font-size:12px;color:var(--accent);font-style:italic">💬 ${esc(p.evidence)}</div>`:''}</div>`;
        }).join('');
    }else{ps.style.display='none';}
    document.getElementById('fb-improvements').innerHTML=fb.improvements.map(s=>`<li>${esc(s)}</li>`).join('')||'<li>多练习几次，AI会发现你的成长空间</li>';
    document.getElementById('fb-summary').textContent=fb.summary;
}

// ═══════ CALL MODE (真声练习) ═══════
let mediaRecorder=null,callStream=null,callStartTime=0,callTranscript='';
async function toggleCallMode(){
    const btn=document.getElementById('btn-call');
    if(mediaRecorder&&mediaRecorder.state==='recording'){stopCallMode();return;}

    // 同时启动 Web Speech 转写 + MediaRecorder 录音
    callTranscript='';
    if(recognition){
        try{recognition.abort();}catch(e){}
        recognition.onresult=e=>{
            let t='';for(let i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;
            callTranscript=t;document.getElementById('chat-input').value=t;
        };
        recognition.onend=()=>{}; // 不要让 onend 调用 stopListening
        try{recognition.start();}catch(e){}
    }
    try{
        callStream=await navigator.mediaDevices.getUserMedia({audio:true});
        mediaRecorder=new MediaRecorder(callStream,{mimeType:'audio/webm'});
        const chunks=[];
        mediaRecorder.ondataavailable=e=>chunks.push(e.data);
        mediaRecorder.onstop=async()=>{
            callStream.getTracks().forEach(t=>t.stop());
            if(recognition)try{recognition.stop();}catch(e){}
            const blob=new Blob(chunks,{type:'audio/webm'});
            const duration=(Date.now()-callStartTime)/1000;
            btn.textContent='📞';btn.classList.remove('listening');
            await analyzeCallVoice(blob,duration);
        };
        callStartTime=Date.now();
        mediaRecorder.start();
        btn.textContent='🔴';btn.classList.add('listening');
    }catch(e){alert('麦克风权限未开启: '+e.message);}
}
function stopCallMode(){
    if(mediaRecorder&&mediaRecorder.state==='recording')mediaRecorder.stop();
}
async function analyzeCallVoice(blob,duration){
    const form=new FormData();
    form.append('audio',blob,'recording.webm');
    form.append('transcript',callTranscript||document.getElementById('chat-input').value);
    form.append('duration',duration.toFixed(1));
    form.append('scene_type',(state.scene&&state.scene.category==='speech')?'speech':'debate');
    try{
        const data=await api('/api/voice/analyze',{method:'POST',body:form,headers:{}});
        showVoiceAnalysis(data);
    }catch(e){alert('语音分析失败: '+e.message);}
}
function showVoiceAnalysis(va){
    const area=document.getElementById('chat-area');
    const d=document.createElement('div');d.className='msg ai';
    d.innerHTML=`<div class="label">🎙️ 语音分析</div>
    <div style="font-size:13px;line-height:1.6">
    <b>${va.pace_wpm} 字/分钟</b> · ${va.duration_sec.toFixed(0)}秒 · ${va.word_count}字<br>
    <span style="color:var(--text2)">${va.pace_feedback}</span><br><br>
    ${esc(va.ai_analysis||'')}
    </div>`;
    area.appendChild(d);area.scrollTop=area.scrollHeight;
}

// ═══════ VOICE INPUT ═══════
let recognition=null,isListening=false;
function initVoice(){
    const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SpeechRecognition){document.getElementById('btn-mic').style.display='none';return;}
    recognition=new SpeechRecognition();
    recognition.lang='zh-CN';
    recognition.interimResults=true;
    recognition.continuous=true;
    recognition.onresult=e=>{
        let transcript='';
        for(let i=e.resultIndex;i<e.results.length;i++)transcript+=e.results[i][0].transcript;
        document.getElementById('chat-input').value=transcript;
    };
    recognition.onerror=e=>{
        if(e.error!=='no-speech')console.warn('语音错误:',e.error);
        stopListening();
    };
    recognition.onend=()=>stopListening();
}
function toggleVoice(){
    if(!recognition){alert('你的浏览器不支持语音输入，请用 Chrome 或 Edge');return;}
    if(isListening){stopListening();return;}
    try{
        recognition.start();
        isListening=true;
        const mic=document.getElementById('btn-mic');
        mic.textContent='🔴';mic.classList.add('listening');
    }catch(e){alert('麦克风权限未开启，请在浏览器设置中允许');}
}
function stopListening(){
    if(!isListening)return;
    try{recognition.stop();}catch(e){}
    isListening=false;
    const mic=document.getElementById('btn-mic');
    mic.textContent='🎤';mic.classList.remove('listening');
}

// ═══════ INIT ═══════
window.onerror=function(msg,url,line){console.error('JS Error:',msg,'line',line);return false;};
try{
document.getElementById('chat-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
document.getElementById('profile-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeProfile()});
document.getElementById('coach-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeCoachPicker()});
loadProfile();
loadCoaches();
loadScenes();
initVoice();
}catch(e){console.error('Init error:',e);alert('页面初始化出错: '+e.message);}
</script>
